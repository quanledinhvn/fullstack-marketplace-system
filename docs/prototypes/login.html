<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Login — DocVerify</title>
		<style>
			*,
			*::before,
			*::after {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
			}

			:root {
				--bg: #f5f5f5;
				--surface: #fff;
				--border: #e2e2e2;
				--text: #111;
				--muted: #666;
				--primary: #2563eb;
				--primary-hover: #1d4ed8;
				--error: #dc2626;
				--radius: 8px;
			}

			body {
				font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
				background: var(--bg);
				min-height: 100dvh;
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				padding: 1rem;
				color: var(--text);
				font-size: 15px;
			}

			.card {
				background: var(--surface);
				border: 1px solid var(--border);
				border-radius: var(--radius);
				padding: 2rem 1.5rem;
				width: 100%;
				max-width: 380px;
			}

			.logo {
				font-size: 1.25rem;
				font-weight: 700;
				margin-bottom: 0.25rem;
			}

			.subtitle {
				color: var(--muted);
				font-size: 0.875rem;
				margin-bottom: 1.75rem;
			}

			label {
				display: block;
				font-size: 0.875rem;
				font-weight: 500;
				margin-bottom: 0.375rem;
			}

			input[type='email'],
			input[type='password'] {
				width: 100%;
				padding: 0.625rem 0.75rem;
				border: 1px solid var(--border);
				border-radius: var(--radius);
				font-size: 0.9375rem;
				outline: none;
				transition: border-color 0.15s;
			}

			input:focus {
				border-color: var(--primary);
				box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
			}

			.field {
				margin-bottom: 1rem;
			}

			.field-error {
				color: var(--error);
				font-size: 0.8125rem;
				margin-top: 0.25rem;
			}

			button[type='submit'] {
				width: 100%;
				background: var(--primary);
				color: #fff;
				border: none;
				border-radius: var(--radius);
				padding: 0.6875rem 1rem;
				font-size: 0.9375rem;
				font-weight: 500;
				cursor: pointer;
				margin-top: 0.5rem;
				transition: background 0.15s;
			}

			button[type='submit']:hover {
				background: var(--primary-hover);
			}
			button[type='submit']:disabled {
				opacity: 0.6;
				cursor: not-allowed;
			}

			.hint {
				margin-top: 1.5rem;
				padding-top: 1.25rem;
				border-top: 1px solid var(--border);
				font-size: 0.8125rem;
				color: var(--muted);
			}

			.hint code {
				background: var(--bg);
				border-radius: 4px;
				padding: 1px 5px;
				font-size: 0.8rem;
			}
		</style>
	</head>
	<body>
		<div class="card">
			<div class="logo">DocVerify</div>
			<div class="subtitle">Document Verification Platform</div>

			<form>
				<div class="field">
					<label for="email">Email</label>
					<input id="email" type="email" placeholder="you@example.com" value="seller@test.com" />
				</div>

				<div class="field">
					<label for="password">Password</label>
					<input id="password" type="password" placeholder="••••••••" value="password123" />
					<div class="field-error" style="display: none">Invalid email or password.</div>
				</div>

				<button type="submit">Sign in</button>
			</form>

			<div class="hint">
				Demo accounts:<br />
				Seller: <code>seller@test.com</code><br />
				Admin: <code>admin@test.com</code><br />
				Password: <code>password123</code>
			</div>
		</div>
	</body>
</html>
